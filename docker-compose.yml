services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - redis
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - ./frontend/.env

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  worker:
    build: ./backend
    command: node redis/worker/loginWorker.js
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  redis:
    image: redis:7
