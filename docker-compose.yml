services:
  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
      - redis
    command: npm run dev -- --host 0.0.0.0
    env_file:
      - ./frontend/.env

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  worker:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    command: node redis/worker/loginWorker.js
    depends_on:
      - redis
    env_file:
      - ./backend/.env

  redis:
    image: redis:7
    ports:
      - "6379:6379"
